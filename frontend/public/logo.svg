<svg
  width="64"
  height="64"
  viewBox="0 0 64 64"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="AtonixDev"
>
  <!-- Circular container -->
  <circle cx="32" cy="32" r="32" fill="#111827"/>

  <!-- Left leg: thick trapezoid (10px at top, 14px at base) -->
